<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Shadow</title>
    <style>
        .t1{
            text-shadow: 2px 1px 8px pink;
        }
        .b1{
            box-shadow: 5px 7px 3px blue;
        }
    </style>
</head>
<body>
    <h3 class="t1">I love my best friend!</h3>
    <h3 class="b1">I love my best friend!</h3>
</body>
</html>
