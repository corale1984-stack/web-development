<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Haired Boys</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p id="characters"></p>
    <p id="characters-join"></p>
    <p id="characters-pop"></p>
    <script>
        var characters=['Ichigo Kurosaki','Hinata Shoyo','Chuuya Nakahara','Naruto Uzumaki']
        document.getElementById("characters").innerHTML=characters
        document.getElementById("characters-join").innerHTML=characters.join("*") 
        document.getElementById("characters-pop").innerHTML=characters.pop()
    </script>
</body>
</html>
