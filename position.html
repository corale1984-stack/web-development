<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        div{
            left: 70px;   
        border: 2px solid;
     } div.sticky{
        position: sticky;
        width: 100px;
        border: 2px solid saddlebrown;

     }
     div.relative{
        position: relative;
        left: 300px;
        border: 2px solid palegoldenrod;
     }
     div.fixed{
        position: fixed;
        width: 100px;
        border: 2px solid palevioletred;
     }
     div.absolute{
        position: absolute;
        border: 2px solid red;
        left: 50px;
     }
            

    </style>
</head>
<body>
    <div>
        div with no position property
    </div>
    <div class="sticky">
     div with sticky position property
    </div>
    <div class="absolute">
    div with absolute position property
    </div>
    <div class="relative">
        div with relative position property
    </div>
    <div class="fixed">
      div with fixed position property
    </div>
