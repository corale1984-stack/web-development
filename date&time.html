<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Number & Live Clock</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 40px; background: #f4f4f9; }
        .box { background: white; max-width: 400px; margin: 20px auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        h2 { color: #555; font-size: 18px; margin-bottom: 5px; }
        .display { font-size: 24px; font-weight: bold; color: #111; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- Section 1: Date & Time -->
    <div class="box">
        <h2>Current Date & Time</h2>
        <div id="clock-display" class="display">Loading...</div>
    </div>

    <!-- Section 2: Random Number -->
    <div class="box">
        <h2>Random Number (1-10)</h2>
        <div id="number-display" class="display">?</div>
        <br>
        <button onclick="generateNumber()">Roll the Dice</button>
    </div>

    <script>
        // --- 1. CLOCK LOGIC ---
        function updateClock() {
            const now = new Date();
            
            // Format the date and time cleanly
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            
            const formattedDateTime = now.toLocaleDateString('en-US', options);
            
            // Push the text into the HTML
            document.getElementById("clock-display").textContent = formattedDateTime;
        }

        // Run the clock immediately when the page loads
        updateClock();
        // Refresh the clock every 1 second (1000 milliseconds)
        setInterval(updateClock, 1000);


        // --- 2. RANDOM NUMBER LOGIC ---
        function generateNumber() {
            let randomNumber = Math.floor(Math.random() * 10) + 1;
            document.getElementById("number-display").textContent = randomNumber;
        }
    </script>

</body>
</html>
