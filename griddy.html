<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Responsive Layout Demo</title>

    <link rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/4.6.2/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.6.2/js/bootstrap.min.js"></script>

    <style>
        body {
            background: #101820;
            font-family: 'Trebuchet MS', sans-serif;
            margin: 0;
            padding: 30px;
        }

        .heading {
            text-align: center;
            color: #ffd166;
            margin-bottom: 35px;
            font-weight: bold;
        }

        .box {
            color: white;
            padding: 35px 15px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 18px;
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.03);
        }

        .blue-theme {
            background: #118ab2;
        }

        .red-theme {
            background: #ef476f;
        }

        .green-theme {
            background: #06d6a0;
        }

        .purple-theme {
            background: #8338ec;
        }

        .orange-theme {
            background: #fb5607;
        }

        .dark-theme {
            background: #3a3a3a;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1 class="heading">Buttons</h1>

        <div class="row">

            <div class="col-md-2">
                <div class="box blue-theme">
                    Sidebar Area
                </div>
            </div>

            <div class="col-md-7">
                <div class="box red-theme">
                    Main Content Section
                </div>
            </div>

            <div class="col-md-3">
                <div class="box green-theme">
                    Notification Panel
                </div>
            </div>

        </div>

        <div class="row">

            <div class="col-md-5">
                <div class="box purple-theme">
                    Gallery Preview
                </div>
            </div>

            <div class="col-md-4">
                <div class="box orange-theme">
                    User Statistics
                </div>
            </div>

            <div class="col-md-3">
                <div class="box dark-theme">
                    Quick Links
                </div>
            </div>

        </div>

    </div>

</body>

</html>
