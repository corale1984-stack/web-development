<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousels</title>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container mt-3">
      <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators" >
            <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active"></button>
              <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active">
           <img src="6cf2cd7f5771e07438d8c678b9caa95c.jpg" alt="jellyfish" class="d-block w-100">
          </div>
          <div class="carousel-item active">
           <img src="6b09d0164214268e12f92bfe0ffff484.jpg" alt="sticker" class="d-block w-100">
          </div>
          <div class="carousel-item active">
           <img src="b7547c726157838a686bf40bb85b1ce8.jpg" alt="pink" class="d-block w-100">
          </div>
          
        </div>

      </div>
    </div>
</body>
</html>
