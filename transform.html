<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <style>
        div {
            height: 300px;
            width: 400px;
            background-color: darkblue;
            margin-top: 50px;
        }
        .Philippines {
            transform: rotateX( 180deg);
        }
    </style>
</head>
<body>
    <div>
        I love the Philippines!
    </div>
    <div class="Philippines">
        I love the Philippines!
    </div>
</body>
</html>
