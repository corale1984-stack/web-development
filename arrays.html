<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="jellyfish"></p>
    <p id="jellyfish-join"></p>
    <p id="jellyfish-pop"></p>
    <script>
        var jellyfish=['Pacific Sea Nettle','Moon Jellyfish','Flower Hat Jellyfish','Irukandiji']
        document.getElementById("jellyfish").innerHTML=jellyfish[3]
        document.getElementById("jellyfish-join").innerHTML=jellyfish.join("*") 
        document.getElementById("jellyfish-pop").innerHTML=jellyfish.pop()
    </script>
</body>
</html>
