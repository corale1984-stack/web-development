<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Nettle Jellyfish</title>
</head>
<body>

    <h1>Sea Nettle Jellyfish</h1>
    <p id="Jellyfish"></p>

    <script>
    var jellyfish={
        name:"Sea Nettle",
        tentacles:24
    }
    document.getElementById("Jellyfish").innerHTML = 
        "The " + jellyfish.name + " is a striking carnivorous jellyfish found in the ocean. " + 
        " A typical adult specimen can trail up to " + jellyfish.tentacles + " long stinging tentacles. " + 
        "These specialized tentacles are used to paralyze prey like tiny fish and zooplankton. " + 
        "Marine biologists frequently study the " + jellyfish.name + " for its unique hunting mechanisms. " + 
        " Having " + jellyfish.tentacles + " stinging lines makes it a highly efficient predator in open water.";
    </script>

</body>
</html>
